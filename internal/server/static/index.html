<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kidney</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --panel: #ffffff;
        --panel-soft: #f8fafc;
        --text: #17202a;
        --muted: #667085;
        --muted-strong: #475467;
        --line: #d9dee7;
        --line-strong: #c5cfdd;
        --accent: #116878;
        --accent-dark: #0e5663;
        --accent-soft: #e7f3f5;
        --danger: #b42318;
        --danger-dark: #971b12;
        --danger-soft: #fff1f0;
        --success: #16803c;
        --shadow: 0 16px 42px rgba(16, 24, 40, .08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1280px, calc(100vw - 40px));
        max-width: 100%;
        margin: 28px auto;
      }

      header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 18px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(30px, 4vw, 44px);
        line-height: 1;
        letter-spacing: 0;
      }

      h2 {
        font-size: 16px;
        line-height: 1.25;
      }

      .subtitle {
        margin-top: 8px;
        color: var(--muted);
        font-size: 14px;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        min-height: 40px;
        max-width: 100%;
        padding: 9px 13px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--panel);
        color: var(--muted-strong);
        box-shadow: 0 8px 24px rgba(16, 24, 40, .05);
        font-size: 14px;
        white-space: nowrap;
      }

      .dot {
        width: 10px;
        height: 10px;
        flex: 0 0 auto;
        border-radius: 999px;
        background: var(--danger);
        box-shadow: 0 0 0 4px var(--danger-soft);
      }

      .dot.connected {
        background: var(--success);
        box-shadow: 0 0 0 4px #e7f6ec;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(280px, 340px) minmax(0, 1fr);
        align-items: start;
        gap: 18px;
      }

      .stack {
        display: grid;
        gap: 14px;
      }

      section,
      form {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 18px;
        box-shadow: 0 8px 28px rgba(16, 24, 40, .04);
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .field-stack {
        display: grid;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 7px;
        color: var(--muted-strong);
        font-size: 13px;
        font-weight: 600;
      }

      .field-help {
        color: var(--muted);
        font-size: 12px;
        font-weight: 500;
        line-height: 1.45;
      }

      input[type="text"],
      input[type="search"],
      input[type="file"],
      select {
        width: 100%;
        min-height: 40px;
        min-width: 0;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        background: #fff;
        color: var(--text);
        padding: 9px 11px;
        font: inherit;
        outline: none;
      }

      input[type="text"]:focus,
      input[type="search"]:focus,
      input[type="file"]:focus,
      select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }

      input::placeholder {
        color: #98a2b3;
      }

      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 40px;
        border: 1px solid var(--accent);
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        padding: 9px 13px;
        font: inherit;
        font-weight: 650;
        cursor: pointer;
        white-space: nowrap;
      }

      button:hover:not(:disabled) {
        background: var(--accent-dark);
        border-color: var(--accent-dark);
      }

      button.secondary {
        background: #fff;
        color: var(--accent);
      }

      button.secondary:hover:not(:disabled) {
        background: var(--accent-soft);
        color: var(--accent-dark);
      }

      button.danger {
        border-color: var(--danger);
        background: var(--danger);
      }

      button.danger:hover:not(:disabled) {
        border-color: var(--danger-dark);
        background: var(--danger-dark);
      }

      button.ghost {
        border-color: var(--line-strong);
        background: #fff;
        color: var(--muted-strong);
      }

      button.ghost:hover:not(:disabled) {
        border-color: var(--line-strong);
        background: var(--panel-soft);
        color: var(--text);
      }

      button:disabled,
      input:disabled,
      select:disabled {
        cursor: not-allowed;
        opacity: .55;
      }

      .full-width {
        width: 100%;
      }

      .message {
        min-height: 22px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.35;
      }

      .message.error {
        color: var(--danger);
      }

      .notice {
        border-color: transparent;
        background: var(--accent-soft);
        color: var(--accent-dark);
        box-shadow: none;
      }

      .notice.error {
        background: var(--danger-soft);
        color: var(--danger);
      }

      .device-card {
        display: grid;
        gap: 12px;
      }

      .device-details {
        display: grid;
        gap: 8px;
      }

      .device-line {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        padding: 8px 0;
        border-bottom: 1px solid var(--line);
        font-size: 13px;
      }

      .device-line:last-child {
        border-bottom: 0;
      }

      .device-label {
        color: var(--muted);
      }

      .device-value {
        min-width: 0;
        color: var(--text);
        font-weight: 650;
        text-align: right;
        overflow-wrap: anywhere;
      }

      .library {
        min-width: 0;
      }

      .library-toolbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: start;
        gap: 12px;
        margin-bottom: 14px;
      }

      .library-title {
        display: flex;
        align-items: baseline;
        gap: 10px;
        min-width: 0;
      }

      .count {
        color: var(--muted);
        font-size: 13px;
        font-weight: 600;
      }

      .library-controls {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: minmax(220px, 1fr) minmax(190px, 230px);
        gap: 10px;
      }

      .format-cloud {
        grid-column: 1 / -1;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        min-width: 0;
      }

      .format-cloud[hidden] {
        display: none;
      }

      .format-chip {
        min-height: 32px;
        border-color: var(--line-strong);
        background: #fff;
        color: var(--muted-strong);
        padding: 6px 10px;
        font-size: 12px;
        text-transform: uppercase;
      }

      .format-chip:hover:not(:disabled) {
        border-color: var(--accent);
        background: var(--accent-soft);
        color: var(--accent-dark);
      }

      .format-chip.active {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      .format-chip-count {
        color: inherit;
        opacity: .7;
        font-weight: 600;
      }

      .books-list {
        display: grid;
        min-width: 0;
        gap: 10px;
      }

      .book-card {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        min-width: 0;
        gap: 16px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        padding: 14px;
        transition: border-color .15s ease, box-shadow .15s ease, transform .15s ease;
      }

      .book-card:hover {
        border-color: var(--line-strong);
        box-shadow: var(--shadow);
        transform: translateY(-1px);
      }

      .book-main {
        min-width: 0;
      }

      .book-name-row {
        display: flex;
        align-items: center;
        gap: 9px;
        min-width: 0;
      }

      .format-badge {
        flex: 0 0 auto;
        min-width: 46px;
        border-radius: 999px;
        background: var(--panel-soft);
        color: var(--muted-strong);
        padding: 3px 8px;
        font-size: 11px;
        font-weight: 750;
        text-align: center;
        text-transform: uppercase;
      }

      .book-name {
        min-width: 0;
        overflow: hidden;
        color: var(--text);
        font-size: 15px;
        font-weight: 650;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .book-path {
        margin-top: 6px;
        overflow: hidden;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .book-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 9px;
        color: var(--muted-strong);
        font-size: 12px;
      }

      .book-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .rename-panel {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 8px;
        border-top: 1px solid var(--line);
        padding-top: 12px;
      }

      .empty-state {
        display: grid;
        place-items: center;
        min-height: 240px;
        border: 1px dashed var(--line-strong);
        border-radius: 8px;
        background: var(--panel-soft);
        color: var(--muted);
        padding: 28px;
        text-align: center;
      }

      @media (max-width: 920px) {
        main {
          width: min(100% - 24px, 760px);
          margin: 18px auto;
        }

        header {
          align-items: flex-start;
          flex-direction: column;
        }

        .layout {
          grid-template-columns: 1fr;
        }

        .library-toolbar {
          grid-template-columns: 1fr auto;
        }

        .library-title {
          flex-wrap: wrap;
        }
      }

      @media (max-width: 560px) {
        main {
          width: calc(100vw - 16px);
        }

        section,
        form {
          padding: 14px;
        }

        .status {
          width: 100%;
          justify-content: center;
          white-space: normal;
        }

        .book-card {
          grid-template-columns: 1fr;
        }

        .book-actions {
          display: grid;
          grid-template-columns: 1fr;
        }

        .book-actions button {
          min-width: 0;
          padding-inline: 8px;
        }

        .library-toolbar,
        .library-controls {
          grid-template-columns: 1fr;
        }

        .rename-panel {
          grid-template-columns: 1fr;
        }

        .device-line {
          display: grid;
          gap: 4px;
        }

        .device-value {
          max-width: 100%;
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Kidney</h1>
          <p class="subtitle">Local Kindle USB library manager</p>
        </div>
        <div class="status">
          <span id="statusDot" class="dot"></span>
          <span id="statusText">Checking device...</span>
        </div>
      </header>

      <div class="layout">
        <div class="stack">
          <form id="uploadForm">
            <div class="panel-head">
              <h2>Upload</h2>
            </div>
            <div class="field-stack">
              <label>
                Local file
                <input id="fileInput" type="file" name="file" accept=".epub,.pdf,.mobi,.azw,.azw3,.kfx,.txt">
                <span class="field-help">
                  Supported: EPUB, PDF, MOBI, AZW, AZW3, KFX, TXT. EPUB uploads are converted to AZW3; PDF and other Kindle-readable formats are uploaded as-is.
                </span>
              </label>
              <label>
                Optional Kindle file name
                <input id="nameInput" type="text" name="name" placeholder="Use original file name">
                <span class="field-help">
                  Enter the name without an extension. Kidney uses the final upload format extension, which can differ after conversion.
                </span>
              </label>
              <button id="uploadButton" class="full-width" type="submit">Upload</button>
            </div>
          </form>

          <section class="device-card">
            <div class="panel-head">
              <h2>Device</h2>
            </div>
            <div id="deviceDetails" class="device-details">
              <div class="message">No device details yet.</div>
            </div>
            <button id="unmountButton" class="secondary full-width" type="button">Unmount</button>
          </section>

          <section id="messagePanel" class="notice" hidden>
            <div id="message" class="message"></div>
          </section>
        </div>

        <section class="library">
          <div class="library-toolbar">
            <div class="library-title">
              <h2>Library</h2>
              <span id="bookCount" class="count"></span>
            </div>
            <button id="refreshButton" class="ghost" type="button">Refresh</button>
            <div class="library-controls">
              <input id="searchInput" type="search" placeholder="Search books" aria-label="Search books">
              <select id="sortSelect" aria-label="Sort books">
                <option value="modified-desc">Date newest</option>
                <option value="modified-asc">Date oldest</option>
                <option value="name-asc">Name A-Z</option>
                <option value="name-desc">Name Z-A</option>
              </select>
            </div>
            <div id="formatCloud" class="format-cloud" aria-label="Filter by format"></div>
          </div>
          <div id="booksList" class="books-list">
            <div class="empty-state">Loading...</div>
          </div>
        </section>
      </div>
    </main>

    <script>
      const state = {
        connected: false,
        books: [],
        search: '',
        selectedFormats: new Set(),
        sort: 'modified-desc',
      };

      const statusDot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');
      const deviceDetails = document.getElementById('deviceDetails');
      const booksList = document.getElementById('booksList');
      const bookCount = document.getElementById('bookCount');
      const messagePanel = document.getElementById('messagePanel');
      const message = document.getElementById('message');
      const uploadForm = document.getElementById('uploadForm');
      const uploadButton = document.getElementById('uploadButton');
      const fileInput = document.getElementById('fileInput');
      const nameInput = document.getElementById('nameInput');
      const searchInput = document.getElementById('searchInput');
      const sortSelect = document.getElementById('sortSelect');
      const formatCloud = document.getElementById('formatCloud');
      const refreshButton = document.getElementById('refreshButton');
      const unmountButton = document.getElementById('unmountButton');

      function setMessage(text, isError = false) {
        message.textContent = text;
        message.classList.toggle('error', isError);
        messagePanel.classList.toggle('error', isError);
        messagePanel.hidden = !text;
      }

      function formatSize(bytes) {
        if (bytes < 1024) return `${bytes} B`;
        if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
        return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
      }

      function formatDate(value) {
        if (!value) return '';

        return new Date(value).toLocaleString([], {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
        });
      }

      function bookFormat(book) {
        const name = book.name || book.path || '';
        const index = name.lastIndexOf('.');

        return index === -1 ? 'file' : name.slice(index + 1).toLowerCase();
      }

      function displayFormat(format) {
        return format.toUpperCase();
      }

      function fileFormat(book) {
        return displayFormat(bookFormat(book));
      }

      async function readJson(response) {
        const body = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(body.error || `Request failed with ${response.status}`);
        }
        return body;
      }

      async function refreshStatus() {
        const status = await fetch('/api/status').then(readJson);
        state.connected = status.connected;
        statusDot.classList.toggle('connected', status.connected);
        statusText.textContent = status.connected ? 'Kindle connected' : 'Kindle not connected';

        const canUseDevice = Boolean(status.connected);
        fileInput.disabled = !canUseDevice;
        nameInput.disabled = !canUseDevice;
        uploadButton.disabled = !canUseDevice;
        searchInput.disabled = !canUseDevice;
        sortSelect.disabled = !canUseDevice;
        unmountButton.disabled = !canUseDevice || !status.device?.mountPath;

        renderDevice(status);
      }

      function renderDevice(status) {
        deviceDetails.replaceChildren();

        if (!status.device) {
          const empty = document.createElement('div');
          empty.className = 'message';
          empty.textContent = status.error || 'Connect and unlock Kindle over USB.';
          deviceDetails.append(empty);
          return;
        }

        const rows = [
          ['Name', status.device.name],
          ['Backend', status.device.backend],
          ['Model', status.device.model],
          ['Serial', status.device.serial],
          ['Path', status.device.mountPath || status.device.documentsPath],
          ['Status', status.device.message],
        ].filter(([, value]) => Boolean(value));

        for (const [label, value] of rows) {
          const row = document.createElement('div');
          row.className = 'device-line';

          const labelElement = document.createElement('span');
          labelElement.className = 'device-label';
          labelElement.textContent = label;

          const valueElement = document.createElement('span');
          valueElement.className = 'device-value';
          valueElement.textContent = value;

          row.append(labelElement, valueElement);
          deviceDetails.append(row);
        }
      }

      async function refreshBooks() {
        if (!state.connected) {
          state.books = [];
          state.selectedFormats.clear();
          renderBooks();
          return;
        }

        state.books = await fetch('/api/books').then(readJson);
        pruneSelectedFormats();
        renderBooks();
      }

      function renderBooks() {
        booksList.replaceChildren();
        renderFormatCloud();

        if (!state.connected) {
          bookCount.textContent = '';
          booksList.append(renderEmptyState('Connect a Kindle to view files.'));
          return;
        }

        const books = filteredAndSortedBooks();
        const hasFilters = Boolean(state.search.trim()) || state.selectedFormats.size > 0;

        bookCount.textContent = hasFilters
          ? `${books.length} of ${state.books.length} files`
          : state.books.length === 1 ? '1 file' : `${state.books.length} files`;

        if (!state.books.length) {
          booksList.append(renderEmptyState('No supported files found.'));
          return;
        }

        if (!books.length) {
          booksList.append(renderEmptyState('No matching files.'));
          return;
        }

        booksList.append(...books.map(renderBookCard));
      }

      function filteredAndSortedBooks() {
        const query = state.search.trim().toLowerCase();
        const books = state.books.filter(book => {
          const matchesQuery = !query || `${book.name} ${book.path || ''}`.toLowerCase().includes(query);
          const matchesFormat = !state.selectedFormats.size || state.selectedFormats.has(bookFormat(book));

          return matchesQuery && matchesFormat;
        });

        return sortBooks(books);
      }

      function sortBooks(books) {
        return [...books].sort((left, right) => {
          switch (state.sort) {
            case 'name-asc':
              return bookTitle(left).localeCompare(bookTitle(right), undefined, {numeric: true, sensitivity: 'base'});
            case 'name-desc':
              return bookTitle(right).localeCompare(bookTitle(left), undefined, {numeric: true, sensitivity: 'base'});
            case 'modified-asc':
              return bookTimestamp(left) - bookTimestamp(right);
            case 'modified-desc':
            default:
              return bookTimestamp(right) - bookTimestamp(left);
          }
        });
      }

      function bookTitle(book) {
        return book.name || book.path || '';
      }

      function bookTimestamp(book) {
        return Date.parse(book.modified || '') || 0;
      }

      function formatCounts() {
        return state.books.reduce((counts, book) => {
          const format = bookFormat(book);
          counts.set(format, (counts.get(format) || 0) + 1);

          return counts;
        }, new Map());
      }

      function pruneSelectedFormats() {
        const availableFormats = new Set(formatCounts().keys());

        for (const format of state.selectedFormats) {
          if (!availableFormats.has(format)) {
            state.selectedFormats.delete(format);
          }
        }
      }

      function renderFormatCloud() {
        formatCloud.replaceChildren();
        formatCloud.hidden = !state.connected || !state.books.length;

        if (formatCloud.hidden) {
          return;
        }

        const counts = [...formatCounts().entries()].sort(([left], [right]) => left.localeCompare(right));
        const allButton = renderFormatChip('all', state.books.length, state.selectedFormats.size === 0);
        formatCloud.append(allButton);

        for (const [format, count] of counts) {
          formatCloud.append(renderFormatChip(format, count, state.selectedFormats.has(format)));
        }
      }

      function renderFormatChip(format, count, isActive) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'format-chip';
        button.classList.toggle('active', isActive);
        button.setAttribute('aria-pressed', String(isActive));
        button.addEventListener('click', () => toggleFormat(format));

        const label = document.createElement('span');
        label.textContent = format === 'all' ? 'All' : displayFormat(format);

        const countElement = document.createElement('span');
        countElement.className = 'format-chip-count';
        countElement.textContent = count;

        button.append(label, countElement);

        return button;
      }

      function toggleFormat(format) {
        if (format === 'all') {
          state.selectedFormats.clear();
          renderBooks();
          return;
        }

        if (state.selectedFormats.has(format)) {
          state.selectedFormats.delete(format);
        } else {
          state.selectedFormats.add(format);
        }

        renderBooks();
      }

      function renderEmptyState(text) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.textContent = text;

        return empty;
      }

      function renderBookCard(book) {
        const card = document.createElement('article');
        card.className = 'book-card';

        const bookID = book.path || book.name;
        const main = document.createElement('div');
        main.className = 'book-main';

        const nameRow = document.createElement('div');
        nameRow.className = 'book-name-row';

        const badge = document.createElement('span');
        badge.className = 'format-badge';
        badge.textContent = fileFormat(book);

        const name = document.createElement('div');
        name.className = 'book-name';
        name.textContent = book.name;
        name.title = book.name;

        nameRow.append(badge, name);
        main.append(nameRow);

        if (book.path && book.path !== book.name) {
          const path = document.createElement('div');
          path.className = 'book-path';
          path.textContent = book.path;
          path.title = book.path;
          main.append(path);
        }

        const meta = document.createElement('div');
        meta.className = 'book-meta';
        meta.append(
          renderMetaItem(formatSize(book.sizeBytes)),
          renderMetaItem(formatDate(book.modified)),
        );
        main.append(meta);

        const actions = document.createElement('div');
        actions.className = 'book-actions';

        const downloadButton = renderButton('Download', 'secondary', () => downloadBook(bookID));
        const renameButton = renderButton('Rename', 'secondary', () => showRenamePanel(card, bookID, book.name));
        const deleteButton = renderButton('Delete', 'danger', () => deleteBook(bookID));

        actions.append(downloadButton, renameButton, deleteButton);
        card.append(main, actions);

        return card;
      }

      function renderMetaItem(text) {
        const item = document.createElement('span');
        item.textContent = text;

        return item;
      }

      function renderButton(text, className, onClick) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = className;
        button.textContent = text;
        button.addEventListener('click', onClick);

        return button;
      }

      function showRenamePanel(card, oldName, currentName) {
        card.querySelector('.rename-panel')?.remove();

        const panel = document.createElement('div');
        panel.className = 'rename-panel';

        const input = document.createElement('input');
        input.type = 'text';
        input.value = currentName;
        input.setAttribute('aria-label', 'New file name');

        const saveButton = renderButton('Save', 'secondary', () => renameBook(oldName, input.value));
        const cancelButton = renderButton('Cancel', 'ghost', () => panel.remove());

        input.addEventListener('keydown', event => {
          if (event.key === 'Enter') {
            event.preventDefault();
            renameBook(oldName, input.value);
          }

          if (event.key === 'Escape') {
            panel.remove();
          }
        });

        panel.append(input, saveButton, cancelButton);
        card.append(panel);
        input.focus();
        input.select();
      }

      async function refreshAll() {
        try {
          await refreshStatus();
          await refreshBooks();
        } catch (error) {
          setMessage(error.message, true);
        }
      }

      async function renameBook(oldName, newName) {
        try {
          await fetch('/api/books', {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({oldName, newName}),
          }).then(readJson);
          setMessage('Renamed.');
          await refreshAll();
        } catch (error) {
          setMessage(error.message, true);
        }
      }

      function downloadBook(name) {
        window.location.href = `/api/download?name=${encodeURIComponent(name)}`;
      }

      async function deleteBook(name) {
        if (!confirm(`Delete ${name} from Kindle?`)) {
          return;
        }

        try {
          const response = await fetch(`/api/books?name=${encodeURIComponent(name)}`, {method: 'DELETE'});
          if (!response.ok) {
            await readJson(response);
          }
          setMessage('Deleted.');
          await refreshAll();
        } catch (error) {
          setMessage(error.message, true);
        }
      }

      uploadForm.addEventListener('submit', async event => {
        event.preventDefault();
        const formData = new FormData(uploadForm);

        try {
          await fetch('/api/upload', {
            method: 'POST',
            body: formData,
          }).then(readJson);
          uploadForm.reset();
          setMessage('Uploaded.');
          await refreshAll();
        } catch (error) {
          setMessage(error.message, true);
        }
      });

      refreshButton.addEventListener('click', refreshAll);

      searchInput.addEventListener('input', event => {
        state.search = event.target.value;
        renderBooks();
      });

      sortSelect.addEventListener('change', event => {
        state.sort = event.target.value;
        renderBooks();
      });

      unmountButton.addEventListener('click', async () => {
        try {
          await fetch('/api/unmount', {method: 'POST'}).then(readJson);
          setMessage('Unmounted.');
          await refreshAll();
        } catch (error) {
          setMessage(error.message, true);
        }
      });

      refreshAll();
      setInterval(refreshAll, 10000);
    </script>
  </body>
</html>
