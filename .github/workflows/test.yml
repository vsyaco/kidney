name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libusb-1.0-0-dev

      - name: Test
        run: go test ./...
